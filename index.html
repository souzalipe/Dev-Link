<!DOCTYPE html>
<html lang="pt-BR" class="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Felipe Souza — Desenvolvedor Full Stack. GitHub, currículo e portfólio.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./index.css">
    <title>@souzalipe · Dev Link</title>
</head>

<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema claro/escuro" title="Alternar tema">
        <ion-icon name="sunny-outline" class="icon icon-sun"></ion-icon>
        <ion-icon name="moon-outline" class="icon icon-moon"></ion-icon>
    </button>

    <main class="container">
        <section class="profile">
            <div class="avatar-ring">
                <img src="https://github.com/souzalipe.png" alt="Foto de Felipe usando óculos, camisa preta e fundo azul" />
            </div>
            <h1 class="nickname">@souzalipe</h1>
            <p class="role">Desenvolvedor Full Stack</p>
        </section>

        <nav class="links" aria-label="Links principais">
            <a class="link-card" href="https://github.com/souzalipe" target="_blank" rel="noopener">
                <span class="link-icon"><ion-icon name="logo-github"></ion-icon></span>
                <span class="link-label">GitHub</span>
                <ion-icon name="arrow-forward-outline" class="link-arrow"></ion-icon>
            </a>

            <a class="link-card" href="./Curriculo_Felipe(2024).pdf" target="_blank" download="Curriculo_Felipe(2024).pdf">
                <span class="link-icon"><ion-icon name="document-text-outline"></ion-icon></span>
                <span class="link-label">Currículo</span>
                <ion-icon name="download-outline" class="link-arrow"></ion-icon>
            </a>

            <a class="link-card" href="https://portifoliofelipe-ebon.vercel.app/" target="_blank" rel="noopener">
                <span class="link-icon"><ion-icon name="briefcase-outline"></ion-icon></span>
                <span class="link-label">Portfólio</span>
                <ion-icon name="arrow-forward-outline" class="link-arrow"></ion-icon>
            </a>
        </nav>

        <div class="social-links" aria-label="Redes sociais">
            <a href="https://github.com/souzalipe" target="_blank" rel="noopener" aria-label="GitHub">
                <ion-icon name="logo-github"></ion-icon>
            </a>
            <a href="https://www.linkedin.com/in/felipe-nascimentodev/" target="_blank" rel="noopener" aria-label="LinkedIn">
                <ion-icon name="logo-linkedin"></ion-icon>
            </a>
            <a href="mailto:fn23886@gmail.com" aria-label="Enviar email">
                <ion-icon name="mail-outline"></ion-icon>
            </a>
        </div>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script src="./script.js"></script>
</body>

</html>
